# ═══════════════════════════════════════════════════════════════════════════════
# AetherContracts — Docker Compose (MVP)
# ═══════════════════════════════════════════════════════════════════════════════
#
# Services:
#   aether-runtime   — Rust scoring engine + Fast API Bridge + Qwen 0.5B
#   dashboard        — Next.js 15 frontend
#   ipfs             — IPFS node for proof anchoring
#
# Profiles:
#   default — CPU only. Runs anywhere Docker is installed.
#   gpu     — GPU accelerated. Requires nvidia-container-toolkit.
#
# Simulation (Determinism Test):
#   docker compose run simulator
#
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ─────────────────────────────────────────────────────────────────────────
  # Core Runtime: Rust + Bridge + LLM
  # ─────────────────────────────────────────────────────────────────────────
  aether-runtime:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aether-runtime
    ports:
      - "8080:8080"   # Rust Scoring Engine
      - "8088:8088"   # LLM Inference (llama.cpp)
      - "8090:8090"   # Bridge API / Simulator
    volumes:
      - aether-data:/data
      - ipfs-staging:/ipfs
    environment:
      - AETHER_ENV=production
      - AETHER_SEED=42
      - RUST_LOG=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # GPU Override Profile
  aether-runtime-gpu:
    extends: aether-runtime
    container_name: aether-runtime-gpu
    profiles: ["gpu"]
    environment:
      - CUDA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ─────────────────────────────────────────────────────────────────────────
  # Simulation Harness (Runs one determinism test and exits)
  # ─────────────────────────────────────────────────────────────────────────
  simulator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aether-simulator
    profiles: ["test"]
    depends_on:
      aether-runtime:
        condition: service_healthy
    environment:
      - AETHER_SEED=42
    entrypoint: ["python3", "/app/scripts/simulate.py"]
    command: ["--runs", "5", "--verbose", "--bridge-url", "http://aether-runtime:8090", "--rust-url", "http://aether-runtime:8080", "--llm-url", "http://aether-runtime:8088"]

  # ─────────────────────────────────────────────────────────────────────────
  # Dashboard: Next.js 15
  # ─────────────────────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: aether-dashboard
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://aether-runtime:8090
      - NEXT_PUBLIC_LLM_URL=http://aether-runtime:8088
    depends_on:
      aether-runtime:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # IPFS Node: Proof Anchoring
  # ─────────────────────────────────────────────────────────────────────────
  ipfs:
    image: ipfs/kubo:latest
    container_name: aether-ipfs
    ports:
      - "5001:5001"   # API
      - "4001:4001"   # Swarm
      - "8081:8080"   # Gateway
    volumes:
      - ipfs-data:/data/ipfs
      - ipfs-staging:/export
    environment:
      - IPFS_PROFILE=server
    restart: unless-stopped

volumes:
  aether-data:
  ipfs-data:
  ipfs-staging:
